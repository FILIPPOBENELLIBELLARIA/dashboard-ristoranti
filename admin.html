  cursor: pointer;
  transition: 0.2s;
  text-align: left;

  width: 100%;
  display: flex;
  align-items: center;
  gap: 15px;
  white-space: nowrap;
}

.menu button:hover {
  background: rgba(255,255,255,0.3);
}

   .contenuto {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
  background: #e9edf2;
}

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 1100px;
    }

    h1 {
      margin-bottom: 25px;
      color: #333;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      border-radius: 12px;
      border: 1px solid #ccc;
      padding: 15px;
      font-size: 18px;
      resize: vertical;
    }

    .azioni {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .azioni button,
    .upload button,
    .foto-item button {
      background: #2f80ed;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
    }

     .file-btn {

  background: #2f80ed;
  color: white;
  padding: 14px 22px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;

  }

    .upload {
      margin-bottom: 30px;
    }

    .galleria {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .foto-item {
      background: #f7f7f7;
      border-radius: 15px;
      padding: 10px;
    }

    .foto-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .foto-item p {
      font-size: 14px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    @media (max-width: 768px) {

      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

    }

   function toggleMenuGiorno(event) {

  event.stopPropagation();

  const box = document.getElementById("toggleMenuGiorno");

  menuGiornoAttivo = !menuGiornoAttivo;

 if(menuGiornoAttivo) {

    box.style.background = "lime";

    localStorage.setItem("menuGiornoAttivo", "true");

  } else {

    box.style.background = "red";

    localStorage.setItem("menuGiornoAttivo", "false");

  }

}

  
    function aggiornaOrologio() {

async function caricaMenu() {

  const fileInput = document.getElementById("menuFile");

  const formData = new FormData();

  formData.append("menu", fileInput.files[0]);

  await fetch("/upload-menu", {

    method: "POST",

    body: formData

  });
     
  apriMenu();

  alert("Menu caricato!");

}

async function apriNotifiche() {

  const risposta = await fetch("testo.json");
  const dati = await risposta.json();

  const rispostaFoto = await fetch("/lista-notifiche");
  const files = await rispostaFoto.json();

  let htmlFoto = "";

  files.forEach(file => {

    htmlFoto += `

      <div class="foto-item">

        <img
          src="/notifiche/${file}"
          style="max-width:300px; border-radius:10px;">

        <button onclick="eliminaNotifica('${file}')">
          ELIMINA
        </button>

      </div>

    `;

  });

  document.getElementById("contenuto").innerHTML = `

    <div class="card">

      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
      ">

        <h1 style="margin:0;">🔔 Notifiche</h1>

        <div style="display:flex; gap:15px;">

          <label class="file-btn">
  📁 Scegli File
  <input
    type="file"
    id="fotoNotifica"
    accept="image/*"
    hidden>
</label>

<button
  class="file-btn"
  onclick="caricaNotifica()">
  📤 Carica Foto
</button>

          <button
            class="file-btn"
            onclick="salvaNotifiche()">
            💾 Salva
          </button>

          <button
  class="file-btn"
  onclick="inviaPushNotifica()">
  📢 Invia Push
</button>

          <button
            class="file-btn"
            onclick="window.location.href='admin.html'">
            ⬅ Torna Home
          </button>

        </div>

      </div>

      <textarea id="testoNotifiche">${dati.notifiche || ""}</textarea>

      <div class="galleria">

        ${htmlFoto}

      </div>

    </div>

  `;

  document.getElementById("fotoNotifica").onchange = function(event) {

    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

      document.querySelector(".galleria").innerHTML += `

        <div class="foto-item">

          <img
            src="${e.target.result}"
            style="max-width:300px; border-radius:10px;">

        </div>

      `;

    };

    reader.readAsDataURL(file);

  };

}

async function salvaNotifiche() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  dati.notifiche =
    document.getElementById("testoNotifiche").value;

  await fetch("/salva-json", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(dati)
  });

  alert("Notifica salvata!");

}

function anteprimaIcona(event) {

  const file = event.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {

    document.getElementById("previewIcona").src = e.target.result;

  };

  reader.readAsDataURL(file);

}
