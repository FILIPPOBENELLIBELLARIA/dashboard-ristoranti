<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Ristorante</title>

  <style>

body {
  margin: 0;
  padding: 0;
  background: #f2f2f2;
  font-family: Arial, sans-serif;
  text-align: center;
}

#logo img {
  width: 100vw;
  max-width: 100vw;
  height: auto;
  display: block;
  margin: 0 auto;
  pointer-events: none;
}

h1 {
  font-size: 60px;
  margin-top: 20px;
  color: #222;
}

#benvenuto {
  font-size: 32px;
  padding: 20px;
}

button {
  width: 90%;
  max-width: 700px;
  display: block;
  margin: 20px auto;
  font-size: 24px;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #2f80ed;
  color: white;
}

.social-btn {
  width: 48px;
  height: 48px;

  margin: 0 !important;
  padding: 0 !important;

  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 24px;
}

.buttons-round {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

</style>

<script
  src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"
  defer>
</script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.init({
    appId: "d7dd6728-7d54-4fa6-8fe0-1ba8cf4f2b4b"
  });

});
</script>

</head>

<body>
   
  <div id="home">
  
  <h1>Ristorante Demo</h1>
  
  <div id="logo"></div>

  <div id="benvenuto"></div>
  <br>

<button onclick="mostraMenu()">🍝 Menù</button>
<button 
  id="btnMenuGiorno"
  onclick="mostraMenuGiorno()"
>
  ⭐ Menu del Giorno
</button>

<button onclick="mostraGalleria()">📸 Galleria</button>

<button onclick="mostraTelefono()">📞 Telefono</button>

<button onclick="mostraMail()">📧 Mail</button>

<button onclick="mostraNotifiche()">🔔 Notifiche</button>
  
<div class="buttons-round">

<button class="social-btn" onclick="mostraMaps()">📍</button>

<button class="social-btn" onclick="mostraInstagram()">📸</button>

<button class="social-btn" onclick="mostraFacebook()">
  <img src="/icona/facebook.png" style="width:24px;">
</button>

<button class="social-btn" onclick="mostraWhatsApp()">
  <img src="/icona/whatsapp.png" style="width:24px;">
</button>
</div>

</div>

<div id="contenuto" style="padding:20px;"></div>

<script>

async function mostraMenu() {
  
  document.getElementById("home").style.display = "none";

  const rispostaTesto = await fetch("testo.json");

  const dati = await rispostaTesto.json();

  const testoMenu = dati.menu;

  let html = `
  
  <h2>Menù</h2>

  <div style="white-space: pre-wrap; word-wrap: break-word;">

  ${testoMenu}

</div>

  <br>

`;

const risposta = await fetch("/lista-menu");

const files = await risposta.json();

  files.forEach(file => {

    if(file.endsWith(".pdf")) {

      html += `
        <iframe 
          src="menu-upload/${file}" 
          width="100%" 
          height="700">
        </iframe>

        <br><br>
      `;

    } else {

      html += `
        <img 
          src="menu-upload/${file}" 
          style="width:100%; max-width:900px;"
        >

        <br><br>
      `;

    }

  });

  html += `

<button onclick="tornaHome()">

⬅ Torna Home

</button>

`;


  document.getElementById("contenuto").innerHTML = html;
  document.getElementById("contenuto").style.display = "block";

}

function tornaHome() {

  document.getElementById("home").style.display = "block";

  document.getElementById("contenuto").innerHTML = "";

}

async function mostraMenuGiorno() {

document.getElementById("home").style.display = "none";  

const risposta = await fetch("testo.json");

const dati = await risposta.json();

const testo = dati.menuGiorno;

  document.getElementById("contenuto").innerHTML = `

   
  <h2>⭐ Menu del Giorno</h2>
  
    <div style="white-space: pre-wrap; overflow-wrap: break-word; width:100%;">

  ${testo}

</div>

<button onclick="tornaHome()">

⬅ Torna Home

</button>

  `;

}


async function mostraGalleria() {

  document.getElementById("home").style.display = "none";

  const risposta = await fetch("/lista-foto");

  const files = await risposta.json();

  const rispostaTesto = await fetch("testo.json");

  const dati = await rispostaTesto.json();

  const testoMenu = dati.menu;

  let html = `
  
  <h2>Galleria</h2>
  
  `;

  files.forEach(file => {

    html += `
    
      <img src="gallery/${file}" width="300">

      <br><br>

    `;

  });

  html += `

<button onclick="tornaHome()">

⬅ Torna Home

</button>

`;

  document.getElementById("contenuto").innerHTML = html;
  document.getElementById("contenuto").style.display = "block";

}

async function mostraNotifiche() {

  document.getElementById("home").style.display = "none";

  const risposta = await fetch("/lista-notifiche");

  const files = await risposta.json();

  const rispostaTesto = await fetch("testo.json");

  const dati = await rispostaTesto.json();

  let html = `

    <h2>🔔 Notifiche</h2>

  <div style="
  white-space: pre-wrap;
  overflow-wrap: break-word;
  text-align:left;
  max-width:900px;
  margin:0 auto 20px auto;
  line-height:1.6;
">
      ${dati.notifiche || ""}
    </div>

  `;

  files.forEach(file => {

    html += `

      <img
        src="/notifiche/${file}"
        style="width:100%; max-width:900px;">

      <br><br>

    `;

  });

  html += `

    <button onclick="tornaHome()">
      ⬅ Torna Home
    </button>

  `;

  document.getElementById("contenuto").innerHTML = html;
  document.getElementById("contenuto").style.display = "block";

}

async function mostraTelefono() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  window.location.href = "tel:" + dati.telefono;

}

async function mostraMaps() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  window.open(dati.maps, "_blank");

}

async function mostraMail() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  window.location.href = "mailto:" + dati.mail;

}

async function mostraInstagram() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  window.open(dati.instagram, "_blank");

}

async function mostraFacebook() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  window.open(dati.facebook, "_blank");

}

async function mostraWhatsApp() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  window.open("https://wa.me/" + dati.whatsapp, "_blank");

}

 async function caricaBenvenuto() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  document.getElementById("benvenuto").innerHTML =
`<div style="white-space: pre-wrap; overflow-wrap: break-word; text-align:left; width:100%;">${dati.benvenuto}</div>`;

}

document.getElementById("logo").innerHTML = `

  <img src="/icona/logo.jpg">

`;
caricaBenvenuto();
const menuGiornoAttivo = localStorage.getItem("menuGiornoAttivo");

if(menuGiornoAttivo === "false") {

  document.getElementById("btnMenuGiorno").style.display = "none";

}
</script>
</body>
</html>
