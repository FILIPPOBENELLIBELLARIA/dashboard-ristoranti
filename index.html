<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Ristorante</title>

  <style>

body {
  margin: 0;
  padding: 0;
}

</style>

</head>

<body>

  <h1>Ristorante Demo</h1>

   <div id="benvenuto"></div>
  <br>

<button onclick="mostraMenu()">🍝 Menù</button>
<button 
  id="btnMenuGiorno"
  onclick="mostraMenuGiorno()"
>
  ⭐ Menu del Giorno
</button>

  <button onclick="mostraGalleria()">📸 Galleria</button>
  
  <div id="contenuto"></div>

<script>

async function mostraMenu() {

  const rispostaTesto = await fetch("testo.json");

  const dati = await rispostaTesto.json();

  const testoMenu = dati.menu;

  let html = `

  <h2>Menù</h2>

  <div style="white-space: pre-wrap; word-wrap: break-word;">

  ${testoMenu}

</div>

  <br>

`;

const risposta = await fetch("/lista-menu");

const files = await risposta.json();

  files.forEach(file => {

    if(file.endsWith(".pdf")) {

      html += `
        <iframe 
          src="menu-upload/${file}" 
          width="100%" 
          height="700">
        </iframe>

        <br><br>
      `;

    } else {

      html += `
        <img 
          src="menu-upload/${file}" 
          style="width:100%; max-width:900px;"
        >

        <br><br>
      `;

    }

  });

  document.getElementById("contenuto").innerHTML = html;

}

async function mostraMenuGiorno() {

const risposta = await fetch("testo.json");

const dati = await risposta.json();

const testo = dati.menuGiorno;

  document.getElementById("contenuto").innerHTML = `

   <h2>⭐ Menu del Giorno</h2>
  
    <div style="white-space: pre-wrap; overflow-wrap: break-word; width:100%;">

  ${testo}

</div>

  `;

}


async function mostraGalleria() {

  const risposta = await fetch("/lista-foto");

  const files = await risposta.json();

  const rispostaTesto = await fetch("testo.json");

  const dati = await rispostaTesto.json();

  const testoMenu = dati.menu;

  let html = "<h2>Galleria</h2>";

  files.forEach(file => {

    html += `
    
      <img src="gallery/${file}" width="300">

      <br><br>

    `;

  });

  document.getElementById("contenuto").innerHTML = html;

}
 async function caricaBenvenuto() {

  const risposta = await fetch("testo.json");

  const dati = await risposta.json();

  document.getElementById("benvenuto").innerHTML = `

    <div style="white-space: pre-wrap; overflow-wrap: break-word; text-align:left; width:100%;">
      ${dati.benvenuto}

    </div>

  `;

}

caricaBenvenuto();
const menuGiornoAttivo = localStorage.getItem("menuGiornoAttivo");

if(menuGiornoAttivo === "false") {

  document.getElementById("btnMenuGiorno").style.display = "none";

}
</script>
</body>
</html>
